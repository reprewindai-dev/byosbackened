name: API Key Rotation Enforcer

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-stale-keys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install psycopg2-binary

      - name: Check for keys older than 90 days
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'EOF'
          import psycopg2, os, sys

          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur = conn.cursor()

          cur.execute("""
            SELECT workspace_id, key_preview, created_at,
                   EXTRACT(DAY FROM NOW() - created_at) AS age_days
            FROM api_keys
            WHERE is_active = true
            AND created_at < NOW() - INTERVAL '90 days'
            ORDER BY age_days DESC
          """)

          stale = cur.fetchall()
          if stale:
              print(f"WARNING: {len(stale)} API keys older than 90 days:")
              for row in stale:
                  print(f"  workspace={row[0]} key={row[1]} age={int(row[3])} days")
          else:
              print("No API keys older than 90 days")
          EOF
