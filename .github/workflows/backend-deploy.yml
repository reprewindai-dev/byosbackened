name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger deploy hook when configured
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          HOOK="${COOLIFY_DEPLOY_WEBHOOK:-${RENDER_DEPLOY_HOOK:-${RAILWAY_DEPLOY_HOOK:-}}}"
          if [ -n "$HOOK" ]; then
            curl -X POST "$HOOK" --retry 3 --retry-delay 10 --retry-all-errors --fail --silent --show-error
          else
            echo "No deploy hook configured; relying on Coolify Git auto-deploy for main."
          fi

      - name: Wait for deployment
        run: sleep 45

      - name: Verify backend is up
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://api.veklom.com' }}
        run: |
          set -euo pipefail
          BASE_URL="${BACKEND_URL%/}"
          for ROUTE in \
            "/health" \
            "/api/v1/edge/demo/summary" \
            "/api/v1/edge/demo/infrastructure?scenario=network&live=false"; do
            BODY_FILE="$(mktemp)"
            STATUS=$(curl -L -sS --output "$BODY_FILE" --write-out "%{http_code}" --max-time 20 \
              --retry 3 --retry-delay 10 --retry-all-errors "$BASE_URL$ROUTE")
            echo "$ROUTE -> HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Response body:"
              cat "$BODY_FILE"
              exit 1
            fi
            rm -f "$BODY_FILE"
          done

      - name: Open incident issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > backend-deploy-incident.md <<EOF
          Workflow: $GITHUB_WORKFLOW
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Commit: $GITHUB_SHA
          Impact: latest backend main may not be healthy in production, or the deploy verification robot failed.
          EOF
          gh issue create \
            --title "[OPS] Backend deploy verification failed" \
            --body-file backend-deploy-incident.md
