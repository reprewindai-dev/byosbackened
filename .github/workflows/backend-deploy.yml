name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger deploy hook when configured
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          HOOK="${COOLIFY_DEPLOY_WEBHOOK:-${RENDER_DEPLOY_HOOK:-${RAILWAY_DEPLOY_HOOK:-}}}"
          if [ -n "$HOOK" ]; then
            curl -X POST "$HOOK" --retry 3 --retry-delay 10 --retry-all-errors --fail --silent --show-error
          else
            echo "No deploy hook configured; relying on Coolify Git auto-deploy for main."
          fi

      - name: Wait for deployment
        run: sleep 45

      - name: Verify backend is up
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://api.veklom.com' }}
        run: |
          set -euo pipefail
          for ROUTE in \
            "/health" \
            "/api/v1/edge/demo/summary" \
            "/api/v1/edge/demo/infrastructure?scenario=network&live=false"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              --retry 3 --retry-delay 10 --retry-all-errors "$BACKEND_URL$ROUTE")
            echo "$ROUTE -> HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              exit 1
            fi
          done

      - name: Open incident issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[OPS] Backend deploy verification failed" \
            --body "Workflow: $GITHUB_WORKFLOW`nRun: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID`nCommit: $GITHUB_SHA`nImpact: latest backend main may not be healthy in production."
