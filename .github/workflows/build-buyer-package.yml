name: Build Buyer Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true

jobs:
  build-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tier: [starter, pro, sovereign]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -e backend

      - name: Build buyer package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          python backend/scripts/build_buyer_package.py \
            --tier ${{ matrix.tier }} \
            --version ${VERSION#v}

      - name: Generate SHA-256 manifest
        run: |
          for f in dist/*.zip; do
            sha256sum "$f" > "$f.sha256"
            echo "$(basename $f): $(sha256sum $f | awk '{print $1}')"
          done

      - name: Upload packages to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          for f in dist/*.zip dist/*.sha256; do
            aws s3 cp "$f" s3://$R2_BUCKET/packages/$(basename $f) \
              --endpoint-url $R2_ENDPOINT
          done

      - name: Create GitHub Release with packages
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          generate_release_notes: true
