name: Compliance Evidence Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        required: true

jobs:
  build-compliance-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Generate compliance package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          mkdir -p compliance-output

          cat > compliance-output/veklom-compliance-evidence-${VERSION}.md << 'MDEOF'
          # Veklom Compliance Evidence Package
          **Product:** Veklom Sovereign AI Gateway

          ## Architecture Summary
          - Self-hosted deployment - data never leaves customer perimeter
          - No multi-tenant SaaS architecture
          - All AI inference runs on customer-controlled Hetzner/on-prem servers
          - Audit logs stored in customer PostgreSQL instance

          ## Data Residency
          - Model inference: local Ollama container
          - Bedrock proxy: routes through customer AWS account only
          - Zero data transmitted to Veklom infrastructure post-install

          ## Access Controls
          - JWT authentication on all endpoints
          - MFA support, GitHub OAuth available
          - Role-based entitlement (admin/owner/member)
          - API key scoping per workspace

          ## Audit Logging
          - Every AI completion logged: timestamp, workspace_id, model, tokens_used, policy_result
          - Immutable audit trail in Postgres
          - Budget enforcement via token wallet middleware

          ## License Enforcement
          - Hardware-bound license keys
          - Stripe payment failure triggers instant license deactivation

          ## HIPAA Alignment
          - PHI never transits Veklom infrastructure
          - Audit controls: Access logs, Workforce authorization
          - Transmission security: TLS on all endpoints

          ## SOC 2 Relevant Controls
          - CC6.1 Logical access controls: pass
          - CC7.2 System monitoring: pass
          - CC9.2 Vendor management: N/A (self-hosted)
          MDEOF

          pandoc compliance-output/veklom-compliance-evidence-${VERSION}.md \
            -o compliance-output/veklom-compliance-evidence-${VERSION}.pdf \
            --pdf-engine=pdflatex 2>/dev/null || \
          echo "PDF generation skipped - markdown ready"

      - name: Upload compliance package to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          aws s3 cp compliance-output/ \
            s3://$R2_BUCKET/compliance/${VERSION}/ \
            --recursive --endpoint-url $R2_ENDPOINT

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: compliance-output/*
