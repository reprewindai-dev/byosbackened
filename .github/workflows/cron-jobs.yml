name: Background Job Runner Cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger job processor
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://api.veklom.com' }}
          JOB_PROCESSOR_API_KEY: ${{ secrets.JOB_PROCESSOR_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${JOB_PROCESSOR_API_KEY:-}" ]; then
            echo "JOB_PROCESSOR_API_KEY is not configured; background job processor cannot run."
            exit 1
          fi
          curl -X POST "$BACKEND_URL/api/v1/jobs/process" \
            -H "Authorization: Bearer $JOB_PROCESSOR_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"cron"}' \
            --retry 3 --retry-delay 10 --retry-all-errors \
            --fail --silent --show-error

      - name: Open incident issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > incident.md <<EOF
          Workflow: $GITHUB_WORKFLOW
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Commit: $GITHUB_SHA
          Impact: queued backend jobs may need manual inspection.
          EOF
          gh issue create \
            --title "[OPS] Background job runner cron failed" \
            --body-file incident.md
