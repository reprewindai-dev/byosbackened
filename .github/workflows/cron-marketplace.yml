name: Marketplace Automation Cron

on:
  schedule:
    - cron: "15 */5 * * 1"
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  run-marketplace-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger marketplace automation endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://api.veklom.com' }}
          MARKETPLACE_AUTOMATION_API_KEY: ${{ secrets.MARKETPLACE_AUTOMATION_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MARKETPLACE_AUTOMATION_API_KEY:-}" ]; then
            echo "MARKETPLACE_AUTOMATION_API_KEY is not configured; marketplace automation cannot run."
            exit 1
          fi
          curl -X POST "$BACKEND_URL/api/v1/marketplace/automation/run" \
            -H "Authorization: Bearer $MARKETPLACE_AUTOMATION_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"cron","source":"github-actions"}' \
            --retry 3 --retry-delay 10 --retry-all-errors \
            --fail --silent --show-error

      - name: Open incident issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > incident.md <<EOF
          Workflow: $GITHUB_WORKFLOW
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Commit: $GITHUB_SHA
          Impact: marketplace automation may not classify/validate queued listings until this is resolved.
          EOF
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "[OPS] Marketplace automation cron failed" \
            --body-file incident.md
