name: Database Migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/alembic/**'
      - 'backend/db/migrations/**'
      - 'backend/db/models/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Validate migration database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          case "$DATABASE_URL" in
            postgresql://*|postgres://*) echo "Migration database is Postgres" ;;
            *) echo "DATABASE_URL must be a live Postgres URL, not empty or SQLite"; exit 1 ;;
          esac

      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          alembic upgrade head
          echo "Migrations applied"
