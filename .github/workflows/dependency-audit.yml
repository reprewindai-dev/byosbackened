name: Dependency Security Audit

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit backend dependency graph
        run: pip-audit backend --skip-editable

  workspace-audit:
    name: Workspace npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/workspace
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/workspace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high
