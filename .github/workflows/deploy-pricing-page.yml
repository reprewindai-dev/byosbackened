name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'backend/landing/**'
      - 'backend/landing-dev/**'
      - 'frontend/workspace/**'
      - 'landing/**'
      - '.github/workflows/deploy-pricing-page.yml'
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/workspace/package-lock.json

      - name: Build and export workspace app
        run: |
          cd frontend/workspace
          npm ci
          npm run export:landing

      - name: Verify frozen .com landing artifact
        run: python backend/scripts/verify_com_landing_freeze.py

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Disable Cloudflare managed robots.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ.get("CLOUDFLARE_API_TOKEN", "").strip()
          if not token:
              raise SystemExit("CLOUDFLARE_API_TOKEN is missing")

          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          }

          def request(method: str, path: str, body: dict | None = None) -> dict:
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  f"https://api.cloudflare.com/client/v4{path}",
                  data=data,
                  headers=headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as res:
                      return json.loads(res.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  payload = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"Cloudflare API {method} {path} failed: {exc.code} {payload}") from exc

          for zone_name in ("veklom.com", "veklom.dev"):
              query = urllib.parse.urlencode({"name": zone_name})
              zone_payload = request("GET", f"/zones?{query}")
              zones = zone_payload.get("result") or []
              if not zones:
                  print(f"warning: Cloudflare zone not visible to this token: {zone_name}", file=sys.stderr)
                  continue
              zone_id = zones[0]["id"]
              update = request(
                  "PATCH",
                  f"/zones/{zone_id}/bot_management",
                  {
                      "is_robots_txt_managed": False,
                      "cf_robots_variant": "off",
                  },
              )
              if not update.get("success"):
                  print(f"warning: could not disable managed robots.txt for {zone_name}: {update}", file=sys.stderr)
                  continue
              print(f"managed robots.txt disabled for {zone_name}")
          PY

      - name: Sync Cloudflare Pages environment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'veklom' }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          DEFAULT_RESEARCH_QUERY: ${{ secrets.DEFAULT_RESEARCH_QUERY }}
          UACP_ADMIN_KEY: ${{ secrets.UACP_ADMIN_KEY }}
          UACP_INTERNAL_API_KEY: ${{ secrets.UACP_INTERNAL_API_KEY }}
          LICENSE_ISSUE_URL: ${{ secrets.LICENSE_ISSUE_URL }}
          LICENSE_ISSUE_BACKUP_URL: ${{ secrets.LICENSE_ISSUE_BACKUP_URL }}
          LICENSE_VERIFY_URL: ${{ secrets.LICENSE_VERIFY_URL }}
          BUYER_DOWNLOAD_BASE_URL: ${{ secrets.BUYER_DOWNLOAD_BASE_URL }}
          BUYER_DOWNLOAD_VERSION: ${{ secrets.BUYER_DOWNLOAD_VERSION }}
        run: |
          set -euo pipefail
          sync_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | wrangler pages secret put "$name" --project-name="$CLOUDFLARE_PAGES_PROJECT"
            fi
          }
          sync_secret USER_EMAIL "$USER_EMAIL"
          sync_secret CONTACT_EMAIL "$CONTACT_EMAIL"
          sync_secret DEFAULT_RESEARCH_QUERY "$DEFAULT_RESEARCH_QUERY"
          sync_secret UACP_ADMIN_KEY "$UACP_ADMIN_KEY"
          sync_secret UACP_INTERNAL_API_KEY "$UACP_INTERNAL_API_KEY"
          sync_secret LICENSE_ISSUE_URL "$LICENSE_ISSUE_URL"
          sync_secret LICENSE_ISSUE_BACKUP_URL "$LICENSE_ISSUE_BACKUP_URL"
          sync_secret LICENSE_VERIFY_URL "$LICENSE_VERIFY_URL"
          sync_secret BUYER_DOWNLOAD_BASE_URL "$BUYER_DOWNLOAD_BASE_URL"
          sync_secret BUYER_DOWNLOAD_VERSION "$BUYER_DOWNLOAD_VERSION"

      - name: Deploy public site to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'veklom' }}
        run: |
          cd backend/landing
          wrangler pages deploy . --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch=main

      - name: Deploy developer site to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DEV_PAGES_PROJECT: ${{ vars.CLOUDFLARE_DEV_PAGES_PROJECT || 'veklom-dev-acquisition' }}
        run: |
          cd backend/landing-dev
          wrangler pages deploy . --project-name="$CLOUDFLARE_DEV_PAGES_PROJECT" --branch=main

      - name: Verify site live
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://veklom.com)
          DEV_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://veklom.dev)
          echo "veklom.com status: $STATUS"
          echo "veklom.dev status: $DEV_STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Cloudflare Pages deploy verification failed"
            exit 1
          fi
          if [ "$DEV_STATUS" != "200" ]; then
            echo "Cloudflare Pages developer deploy verification failed"
            exit 1
          fi
