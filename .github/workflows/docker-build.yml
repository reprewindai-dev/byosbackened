name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  api-image:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/infra/docker/Dockerfile.api
          push: false
          tags: veklom-api:${{ github.sha }}

      - name: Push API image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/infra/docker/Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/veklom-api:${{ github.sha }}
