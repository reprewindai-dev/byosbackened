name: Model Integrity Check

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  model-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify public demo LLM path is healthy
        run: |
          set -euo pipefail
          HEALTH=$(curl -fsS https://api.veklom.com/api/v1/demo/pipeline/health)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"llm_ok":true'
          echo "$HEALTH" | grep -q '"groq_fallback_enabled":true'

      - name: Verify authenticated exec model responds
        if: ${{ secrets.CI_API_KEY != '' }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsS -X POST https://api.veklom.com/v1/exec \
            -H "X-API-Key: ${{ secrets.CI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"model":"qwen2.5:0.5b","prompt":"Reply with only: OK","max_tokens":5}' \
            --max-time 30)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -Eiq 'ok|response|result|audit'
