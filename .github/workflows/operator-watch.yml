name: Operator Watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  operator-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Run backend operator watch
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://api.veklom.com' }}
          INTERNAL_OPERATOR_TOKEN: ${{ secrets.INTERNAL_OPERATOR_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${INTERNAL_OPERATOR_TOKEN:-}" || (echo "INTERNAL_OPERATOR_TOKEN is missing" && exit 1)
          RESPONSE="$(curl -fsS -X POST \
            -H "Authorization: Bearer ${INTERNAL_OPERATOR_TOKEN}" \
            "${BACKEND_URL%/}/api/v1/internal/operators/watch")"
          echo "$RESPONSE"
          STATUS="$(python - <<'PY' "$RESPONSE"
          import json, sys
          print(json.loads(sys.argv[1]).get("status", "unknown"))
          PY
          )"
          if [ "$STATUS" = "critical" ]; then
            echo "Operator watch detected critical backend health pressure."
            exit 1
          fi

      - name: Open incident issue on critical watch failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > operator-watch-incident.md <<EOF
          Workflow: $GITHUB_WORKFLOW
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Impact: backend operator watch detected critical pressure or could not run.
          Action: Check /api/v1/internal/operators/digest and open backend alerts.
          EOF
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "[OPS] Operator watch requires attention" \
            --body-file operator-watch-incident.md
