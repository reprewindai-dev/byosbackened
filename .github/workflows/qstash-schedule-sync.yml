name: QStash Schedule Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print schedules without creating/updating them"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  sync-qstash-schedules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: python -m pip install httpx

      - name: Upsert QStash schedules
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          BACKEND_URL: ${{ secrets.BACKEND_URL || 'https://api.veklom.com' }}
          JOB_PROCESSOR_API_KEY: ${{ secrets.JOB_PROCESSOR_API_KEY }}
          MARKETPLACE_AUTOMATION_API_KEY: ${{ secrets.MARKETPLACE_AUTOMATION_API_KEY }}
        run: python backend/scripts/setup_qstash_schedules.py
