name: Route Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  audit-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        run: pip install -e backend

      - name: Run route contract audit
        run: python backend/scripts/audit_routes.py
