name: Route Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend
        run: pip install -e backend

      - name: Run route contract audit
        run: python backend/scripts/audit_routes.py

      - name: Open incident issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > incident.md <<EOF
          Workflow: $GITHUB_WORKFLOW
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          Commit: $GITHUB_SHA
          Impact: a required backend route contract regressed.
          EOF
          gh issue create \
            --title "[OPS] Route audit failed" \
            --body-file incident.md
