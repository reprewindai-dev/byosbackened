name: Secret Rotation Guardian

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      force_rotate:
        description: 'Comma-separated secret names to force into rotation, e.g. CLOUDFLARE_API_TOKEN,STRIPE_SECRET_KEY'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  rotation-guardian:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install psycopg2-binary

      - name: Audit GitHub secret metadata
        env:
          GH_TOKEN: ${{ secrets.SECRET_ROTATION_GH_TOKEN || github.token }}
          FORCE_ROTATE_SECRETS: ${{ github.event.inputs.force_rotate }}
        run: |
          python backend/scripts/secret_rotation_audit.py \
            --skip-db \
            --report provider-secret-rotation-report.md

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/veklom-deploy
          chmod 600 ~/.ssh/veklom-deploy
          ssh-keyscan -H 5.78.135.11 >> ~/.ssh/known_hosts

      - name: Audit live database API keys
        run: |
          set -o pipefail
          ssh -i ~/.ssh/veklom-deploy root@5.78.135.11 \
            "cid=\$(docker ps -q --filter label=coolify.resourceName=veklom-api | head -1); test -n \"\$cid\"; docker exec \"\$cid\" sh -lc 'cd /app && python scripts/secret_rotation_audit.py --skip-provider --report db-secret-rotation-report.md; code=\$?; cat db-secret-rotation-report.md; exit \$code'" \
            | tee db-secret-rotation-report.md

      - name: Collect reports
        if: always()
        run: |
          cat provider-secret-rotation-report.md > secret-rotation-report.md
          {
            echo
            echo "---"
            echo
            echo "## Live DB API Key Audit"
          } >> secret-rotation-report.md
          if [ -f db-secret-rotation-report.md ]; then
            cat db-secret-rotation-report.md >> secret-rotation-report.md
          else
            echo "Live DB audit did not produce a local report. Check the SSH audit step." >> secret-rotation-report.md
          fi

      - name: Open rotation issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="[SECURITY] Secret rotation guardian requires action"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment --repo "$GITHUB_REPOSITORY" "$EXISTING" --body-file secret-rotation-report.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body-file secret-rotation-report.md
          fi

      - name: Upload rotation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-rotation-report
          path: secret-rotation-report.md
