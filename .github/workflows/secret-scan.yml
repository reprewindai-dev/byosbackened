name: Secret Scan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  repo-patterns:
    name: Veklom secret patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run repository secret scanner
        shell: pwsh
        run: backend/scripts/check_secrets.ps1
