<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYOS AI Backend - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        .switch-toggle {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #10b981;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .category-card {
            transition: all 0.3s ease;
        }
        .category-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .status-online {
            color: #10b981;
        }
        .status-offline {
            color: #ef4444;
        }
        .metric-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen p-4">
        <!-- Header -->
        <header class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">BYOS AI Backend</h1>
                    <p class="text-gray-600">Admin Dashboard - System Configuration</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right">
                        <p class="text-sm text-gray-500">System Status</p>
                        <p id="system-status" class="font-semibold status-online">Online</p>
                    </div>
                    <button onclick="refreshData()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
                        Refresh
                    </button>
                </div>
            </div>
        </header>

        <!-- Metrics Overview -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="metric-card text-white p-6 rounded-lg">
                <h3 class="text-lg font-semibold mb-2">Total Switches</h3>
                <p id="total-switches" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-green-500 text-white p-6 rounded-lg">
                <h3 class="text-lg font-semibold mb-2">Enabled</h3>
                <p id="enabled-switches" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-red-500 text-white p-6 rounded-lg">
                <h3 class="text-lg font-semibold mb-2">Disabled</h3>
                <p id="disabled-switches" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-purple-500 text-white p-6 rounded-lg">
                <h3 class="text-lg font-semibold mb-2">Categories</h3>
                <p id="total-categories" class="text-3xl font-bold">0</p>
            </div>
        </div>

        <!-- Categories Container -->
        <div id="categories-container" class="space-y-4">
            <!-- Categories will be dynamically inserted here -->
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
            <div class="bg-white p-6 rounded-lg">
                <p class="text-lg font-semibold">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let dashboardData = {
            switches: [],
            system_info: {}
        };

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });

        // Load data from API
        async function loadData() {
            showLoading(true);
            try {
                // Load switches
                const switchesResponse = await axios.get('/api/admin/switches');
                dashboardData.switches = switchesResponse.data;

                // Load system info
                const systemResponse = await axios.get('/api/admin/system');
                dashboardData.system_info = systemResponse.data;

                updateMetrics();
                renderCategories();
                updateSystemStatus();
            } catch (error) {
                console.error('Error loading data:', error);
                // Use mock data for demonstration
                loadMockData();
            } finally {
                showLoading(false);
            }
        }

        // Load mock data for demonstration
        function loadMockData() {
            dashboardData = {
                switches: [
                    {
                        name: 'ai_service_enabled',
                        display_name: 'AI Service',
                        description: 'Enable/disable AI processing services',
                        category: 'AI Services',
                        enabled: true,
                        last_modified: '2024-02-27T01:00:00Z'
                    },
                    {
                        name: 'database_connection',
                        display_name: 'Database Connection',
                        description: 'Database connectivity and operations',
                        category: 'Database',
                        enabled: true,
                        last_modified: '2024-02-27T01:30:00Z'
                    },
                    {
                        name: 'security_monitoring',
                        display_name: 'Security Monitoring',
                        description: 'Security threat detection and monitoring',
                        category: 'Security',
                        enabled: false,
                        last_modified: '2024-02-26T23:45:00Z'
                    },
                    {
                        name: 'performance_metrics',
                        display_name: 'Performance Metrics',
                        description: 'System performance monitoring and metrics',
                        category: 'Monitoring',
                        enabled: true,
                        last_modified: '2024-02-27T00:15:00Z'
                    }
                ],
                system_info: {
                    status: 'online',
                    uptime: '2 days, 14 hours',
                    version: '1.0.0'
                }
            };

            updateMetrics();
            renderCategories();
            updateSystemStatus();
        }

        // Update metrics display
        function updateMetrics() {
            const totalSwitches = dashboardData.switches.length;
            const enabledSwitches = dashboardData.switches.filter(function(s) { return s.enabled; }).length;
            const disabledSwitches = totalSwitches - enabledSwitches;
            const categories = [...new Set(dashboardData.switches.map(function(s) { return s.category; }))].length;

            document.getElementById('total-switches').textContent = totalSwitches;
            document.getElementById('enabled-switches').textContent = enabledSwitches;
            document.getElementById('disabled-switches').textContent = disabledSwitches;
            document.getElementById('total-categories').textContent = categories;
        }

        // Render categories
        function renderCategories() {
            const categories = {};
            
            // Group switches by category
            dashboardData.switches.forEach(function(switch) {
                if (!categories[switch.category]) {
                    categories[switch.category] = [];
                }
                categories[switch.category].push(switch);
            });

            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            Object.keys(categories).forEach(function(category) {
                const switches = categories[category];
                const categoryCard = createCategoryCard(category, switches);
                container.appendChild(categoryCard);
            });
        }

        // Create category card
        function createCategoryCard(category, switches) {
            const enabledCount = switches.filter(function(s) { return s.enabled; }).length;
            const categoryIcons = {
                'AI Services': '🤖',
                'Database': '🗄️',
                'Security': '🔒',
                'Monitoring': '📊',
                'API': '🔌',
                'Storage': '💾'
            };
            
            const card = document.createElement('div');
            card.className = 'category-card bg-white rounded-lg shadow-md p-6 mb-4';
            
            const icon = categoryIcons[category] || '📁';
            const switchesHtml = switches.map(function(switch) {
                return createSwitchHTML(switch);
            }).join('');
            
            card.innerHTML = 
                '<div class="flex items-center justify-between mb-4">' +
                    '<h3 class="text-lg font-semibold">' + icon + ' ' + category + '</h3>' +
                    '<span class="text-sm text-gray-500">' + enabledCount + '/' + switches.length + ' enabled</span>' +
                '</div>' +
                '<div class="space-y-3">' +
                    switchesHtml +
                '</div>';
            
            return card;
        }

        // Create switch HTML
        function createSwitchHTML(switch) {
            const checkedAttr = switch.enabled ? 'checked' : '';
            const modifiedHtml = switch.last_modified ? 
                '<p class="text-xs text-gray-400">Modified: ' + new Date(switch.last_modified).toLocaleString() + '</p>' : '';
            
            return '<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">' +
                '<div class="flex-1">' +
                    '<h4 class="font-medium text-sm">' + switch.display_name + '</h4>' +
                    '<p class="text-xs text-gray-500">' + switch.description + '</p>' +
                    modifiedHtml +
                '</div>' +
                '<label class="switch-toggle">' +
                    '<input type="checkbox" ' + checkedAttr + ' onchange="toggleSwitch(\'' + switch.name + '\', this.checked)">' +
                    '<span class="slider"></span>' +
                '</label>' +
            '</div>';
        }

        // Toggle switch
        async function toggleSwitch(switchName, enabled) {
            try {
                await axios.post('/api/admin/switches/' + switchName, {
                    enabled: enabled
                });
                
                // Update local data
                const switchObj = dashboardData.switches.find(function(s) { 
                    return s.name === switchName; 
                });
                if (switchObj) {
                    switchObj.enabled = enabled;
                    switchObj.last_modified = new Date().toISOString();
                }
                
                updateMetrics();
                renderCategories();
            } catch (error) {
                console.error('Error toggling switch:', error);
                alert('Error updating switch. Please try again.');
            }
        }

        // Update system status
        function updateSystemStatus() {
            const statusElement = document.getElementById('system-status');
            if (dashboardData.system_info.status === 'online') {
                statusElement.textContent = 'Online';
                statusElement.className = 'font-semibold status-online';
            } else {
                statusElement.textContent = 'Offline';
                statusElement.className = 'font-semibold status-offline';
            }
        }

        // Refresh data
        function refreshData() {
            loadData();
        }

        // Show/hide loading indicator
        function showLoading(show) {
            const loadingElement = document.getElementById('loading');
            if (show) {
                loadingElement.classList.remove('hidden');
            } else {
                loadingElement.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
