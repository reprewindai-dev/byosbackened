<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYOS AI Backend - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #10b981;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold mb-8">🔧 BYOS AI Backend - Admin Dashboard</h1>
        
        <!-- Status -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">📊 System Status</h2>
            <div id="status-content">
                <p>Loading...</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">🎛️ System Controls</h2>
            <div id="controls-content">
                <p>Loading...</p>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold mb-4">📋 Activity Log</h2>
            <div id="activity-log" class="space-y-2 max-h-64 overflow-y-auto">
                <p class="text-gray-500">No activity yet...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        let authToken = null;

        async function login() {
            try {
                const response = await axios.post(API_BASE + '/auth/login', {
                    username: 'admin',
                    password: 'admin123'
                });
                authToken = response.data.access_token;
                console.log('Login successful');
                return true;
            } catch (error) {
                console.error('Login failed:', error);
                return false;
            }
        }

        async function initDashboard() {
            const loginSuccess = await login();
            if (!loginSuccess) {
                showError('Failed to authenticate. Make sure server is running.');
                return;
            }

            try {
                const response = await axios.get(API_BASE + '/admin/dashboard/config', {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const data = response.data;
                renderDashboard(data);
                addActivity('Dashboard loaded successfully', 'success');
            } catch (error) {
                console.error('Failed to load dashboard:', error);
                showError('Failed to load dashboard: ' + error.message);
            }
        }

        function renderDashboard(data) {
            // Update status
            const statusDiv = document.getElementById('status-content');
            statusDiv.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <p class="text-gray-500">Server Status</p>
                        <p class="text-lg font-bold text-green-600">${data.system_status.server_status}</p>
                    </div>
                    <div>
                        <p class="text-gray-500">Active Features</p>
                        <p class="text-lg font-bold text-blue-600">${data.switches.filter(s => s.enabled).length}/${data.switches.length}</p>
                    </div>
                    <div>
                        <p class="text-gray-500">System Load</p>
                        <p class="text-lg font-bold text-orange-600">${data.metrics.system_load || 0}%</p>
                    </div>
                </div>
            `;

            // Update controls
            const controlsDiv = document.getElementById('controls-content');
            const categories = {};
            data.switches.forEach(switch => {
                if (!categories[switch.category]) {
                    categories[switch.category] = [];
                }
                categories[switch.category].push(switch);
            });

            let controlsHTML = '';
            Object.entries(categories).forEach(([category, switches]) => {
                const icons = {
                    'AI System': '🤖',
                    'Providers': '🔌',
                    'Billing': '💳',
                    'Security': '🔒',
                    'Features': '⚡',
                    'Monitoring': '📊',
                    'Advanced': '🔧'
                };

                controlsHTML += `
                    <div class="mb-6">
                        <h3 class="text-lg font-semibold mb-3">${icons[category] || '📁'} ${category}</h3>
                        <div class="space-y-2">
                            ${switches.map(switch => `
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded">
                                    <div class="flex-1">
                                        <h4 class="font-medium">${switch.display_name}</h4>
                                        <p class="text-sm text-gray-500">${switch.description}</p>
                                    </div>
                                    <label class="switch">
                                        <input type="checkbox" ${switch.enabled ? 'checked' : ''} 
                                               onchange="toggleSwitch('${switch.name}', this.checked)">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            controlsDiv.innerHTML = controlsHTML;

            // Add bulk actions
            controlsDiv.innerHTML += `
                <div class="mt-6 pt-6 border-t">
                    <h3 class="text-lg font-semibold mb-3">⚡ Bulk Actions</h3>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="enableAll()" class="bg-green-600 text-white px-4 py-2 rounded">Enable All</button>
                        <button onclick="disableAll()" class="bg-red-600 text-white px-4 py-2 rounded">Disable All</button>
                        <button onclick="refresh()" class="bg-blue-600 text-white px-4 py-2 rounded">Refresh</button>
                    </div>
                </div>
            `;
        }

        async function toggleSwitch(name, enabled) {
            try {
                await axios.put(API_BASE + '/admin/dashboard/switches/' + name, 
                    { enabled: enabled },
                    { headers: { 'Authorization': 'Bearer ' + authToken } }
                );
                addActivity(`${enabled ? 'Enabled' : 'Disabled'} ${name}`, 'info');
                setTimeout(initDashboard, 500); // Refresh after a short delay
            } catch (error) {
                addActivity(`Failed to toggle ${name}: ${error.message}`, 'error');
            }
        }

        async function enableAll() {
            try {
                const response = await axios.get(API_BASE + '/admin/dashboard/config', {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const switches = response.data.switches;
                const updates = {};
                switches.forEach(switch => {
                    updates[switch.name] = true;
                });
                
                await axios.post(API_BASE + '/admin/dashboard/switches/bulk-update', 
                    updates,
                    { headers: { 'Authorization': 'Bearer ' + authToken } }
                );
                addActivity('Enabled all features', 'success');
                setTimeout(initDashboard, 500);
            } catch (error) {
                addActivity('Failed to enable all: ' + error.message, 'error');
            }
        }

        async function disableAll() {
            try {
                const response = await axios.get(API_BASE + '/admin/dashboard/config', {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const switches = response.data.switches;
                const updates = {};
                switches.forEach(switch => {
                    updates[switch.name] = false;
                });
                
                await axios.post(API_BASE + '/admin/dashboard/switches/bulk-update', 
                    updates,
                    { headers: { 'Authorization': 'Bearer ' + authToken } }
                );
                addActivity('Disabled all features', 'warning');
                setTimeout(initDashboard, 500);
            } catch (error) {
                addActivity('Failed to disable all: ' + error.message, 'error');
            }
        }

        function refresh() {
            addActivity('Refreshing dashboard...', 'info');
            initDashboard();
        }

        function addActivity(message, type) {
            const log = document.getElementById('activity-log');
            const timestamp = new Date().toLocaleTimeString();
            
            const icons = {
                'success': '✅',
                'error': '❌',
                'warning': '⚠️',
                'info': 'ℹ️'
            };
            
            const colors = {
                'success': 'text-green-600',
                'error': 'text-red-600',
                'warning': 'text-yellow-600',
                'info': 'text-blue-600'
            };
            
            const item = document.createElement('div');
            item.className = 'flex items-center space-x-2 p-2 bg-gray-50 rounded ' + colors[type];
            item.innerHTML = `
                <span>${icons[type]}</span>
                <span class="text-sm">${message}</span>
                <span class="text-xs text-gray-500">${timestamp}</span>
            `;
            
            log.insertBefore(item, log.firstChild);
            
            // Keep only last 10 items
            while (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }

        function showError(message) {
            document.getElementById('status-content').innerHTML = `
                <div class="text-red-600">
                    <p class="text-lg font-bold">❌ Error</p>
                    <p>${message}</p>
                    <p class="text-sm mt-2">Make sure the server is running at http://localhost:8000</p>
                    <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded">
                        Try Again
                    </button>
                </div>
            `;
            
            document.getElementById('controls-content').innerHTML = `
                <div class="text-red-600">
                    <p>Cannot load controls due to connection error.</p>
                </div>
            `;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
