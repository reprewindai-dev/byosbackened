<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BYOS Command Center - Simple Dashboard</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script defer="defer" src="/static/js/main.edbc4625.js"></script><link href="/static/css/main.c3d964f3.css" rel="stylesheet"></head><body class="bg-gray-100"><div class="container mx-auto px-4 py-8"><header class="bg-white rounded-lg shadow p-6 mb-8"><h1 class="text-3xl font-bold text-gray-900 mb-2">🚀 BYOS Command Center</h1><p class="text-gray-600">Enterprise-grade system monitoring and control</p><div class="mt-4 flex items-center space-x-4 text-sm"><span id="status" class="px-2 py-1 bg-green-100 text-green-800 rounded-full">Loading...</span> <span id="last-updated" class="text-gray-500">Last updated: Never</span></div></header><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8"><div class="bg-white rounded-lg shadow p-6"><div class="flex items-center justify-between"><div><h3 class="text-lg font-semibold text-gray-900">Total Users</h3><p id="total-users" class="text-3xl font-bold text-blue-600">0</p></div><div class="text-4xl">👥</div></div></div><div class="bg-white rounded-lg shadow p-6"><div class="flex items-center justify-between"><div><h3 class="text-lg font-semibold text-gray-900">Active Workspaces</h3><p id="active-workspaces" class="text-3xl font-bold text-green-600">0</p></div><div class="text-4xl">🏢</div></div></div><div class="bg-white rounded-lg shadow p-6"><div class="flex items-center justify-between"><div><h3 class="text-lg font-semibold text-gray-900">Running Apps</h3><p id="running-apps" class="text-3xl font-bold text-purple-600">0</p></div><div class="text-4xl">📱</div></div></div><div class="bg-white rounded-lg shadow p-6"><div class="flex items-center justify-between"><div><h3 class="text-lg font-semibold text-gray-900">System Health</h3><p id="system-health" class="text-3xl font-bold text-red-600">0%</p></div><div class="text-4xl">❤️</div></div></div></div><div class="bg-white rounded-lg shadow p-6 mb-8"><h2 class="text-xl font-semibold text-gray-900 mb-4">🔧 System Services</h2><div id="services-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><div class="animate-pulse"><div class="h-20 bg-gray-200 rounded"></div></div></div></div><div class="bg-white rounded-lg shadow p-6 mb-8"><h2 class="text-xl font-semibold text-gray-900 mb-4">⚡ Quick Actions</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"><button onclick='executeAction("restart-api")' class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 transition-colors">🔄 Restart API Server</button> <button onclick='executeAction("clear-cache")' class="bg-yellow-600 text-white px-4 py-3 rounded-lg hover:bg-yellow-700 transition-colors">🧹 Clear Redis Cache</button> <button onclick='executeAction("backup-db")' class="bg-green-600 text-white px-4 py-3 rounded-lg hover:bg-green-700 transition-colors">💾 Database Backup</button> <button onclick='executeAction("maintenance-mode")' class="bg-red-600 text-white px-4 py-3 rounded-lg hover:bg-red-700 transition-colors">🚧 Maintenance Mode</button></div><div id="action-result" class="mt-4 p-3 bg-gray-50 rounded-lg hidden"><p id="action-message" class="text-sm"></p></div></div><div class="bg-white rounded-lg shadow p-6"><h2 class="text-xl font-semibold text-gray-900 mb-4">📝 Recent Activity</h2><div id="activity-list" class="space-y-3"><div class="animate-pulse"><div class="h-16 bg-gray-200 rounded"></div><div class="h-16 bg-gray-200 rounded"></div><div class="h-16 bg-gray-200 rounded"></div></div></div></div></div><script>const API_BASE="http://localhost:8765/api/v1";async function updateDashboard(){try{document.getElementById("status").textContent="Loading...",document.getElementById("status").className="px-2 py-1 bg-yellow-100 text-yellow-800 rounded-full";const t=await fetch(`${API_BASE}/dashboard/stats`),e=await t.json();document.getElementById("total-users").textContent=e.totalUsers.toLocaleString(),document.getElementById("active-workspaces").textContent=e.activeWorkspaces,document.getElementById("running-apps").textContent=e.runningApps,document.getElementById("system-health").textContent=`${e.systemHealth}%`;const n=await fetch(`${API_BASE}/dashboard/system-status`),s=await n.json();document.getElementById("services-list").innerHTML=s.services.map(t=>`\n                    <div class="p-4 border border-gray-200 rounded-lg">\n                        <div class="flex items-center justify-between mb-2">\n                            <h3 class="font-medium text-gray-900">${t.name}</h3>\n                            <span class="px-2 py-1 text-xs rounded-full ${"healthy"===t.status?"bg-green-100 text-green-800":"warning"===t.status?"bg-yellow-100 text-yellow-800":"bg-red-100 text-red-800"}">${t.status.toUpperCase()}</span>\n                        </div>\n                        <p class="text-sm text-gray-600">Uptime: ${t.uptime}</p>\n                        <p class="text-xs text-gray-500 mt-1">Last check: ${new Date(t.lastCheck).toLocaleString()}</p>\n                    </div>\n                `).join("");const a=await fetch(`${API_BASE}/dashboard/recent-activity`),o=await a.json();document.getElementById("activity-list").innerHTML=o.activities.map(t=>`\n                    <div class="flex items-start space-x-3 p-3 hover:bg-gray-50 rounded-lg transition-colors">\n                        <div class="text-2xl flex-shrink-0">${getActivityIcon(t.type)}</div>\n                        <div class="flex-1 min-w-0">\n                            <div class="flex items-center space-x-2 mb-1">\n                                <p class="text-sm font-medium text-gray-900 truncate">${t.user}</p>\n                                <span class="px-2 py-1 text-xs rounded-full ${"high"===t.severity?"bg-red-100 text-red-800":"medium"===t.severity?"bg-yellow-100 text-yellow-800":"bg-green-100 text-green-800"}">${t.severity.toUpperCase()}</span>\n                            </div>\n                            <p class="text-sm text-gray-700 mb-1">${t.action}</p>\n                            <div class="flex items-center space-x-2 text-xs text-gray-500">\n                                <span>🏢 ${t.workspace}</span>\n                                <span>•</span>\n                                <span>${new Date(t.timestamp).toLocaleString()}</span>\n                            </div>\n                        </div>\n                    </div>\n                `).join(""),document.getElementById("status").textContent="Online",document.getElementById("status").className="px-2 py-1 bg-green-100 text-green-800 rounded-full",document.getElementById("last-updated").textContent=`Last updated: ${(new Date).toLocaleTimeString()}`}catch(t){console.error("Error updating dashboard:",t),document.getElementById("status").textContent="Error",document.getElementById("status").className="px-2 py-1 bg-red-100 text-red-800 rounded-full",document.getElementById("last-updated").textContent=`Error: ${t.message}`}}function switchToIDE(){alert("To switch back to IDE:\n\n1. Close this browser tab\n2. Return to your IDE\n3. The code files are ready for editing\n\nYour BYOS Command Center will continue running in the background.")}function openAPIDocs(){window.open("http://localhost:8765/docs","_blank")}function openBrowser(){window.location.reload()}async function executeAction(t){const e=document.getElementById("action-result"),n=document.getElementById("action-message");try{e.className="mt-4 p-3 bg-yellow-50 rounded-lg",n.textContent="Executing action...";const s=await fetch(`${API_BASE}/dashboard/system-controls/${t}`,{method:"POST"}),a=await s.json();if(!a.success)throw new Error(a.detail||"Action failed");e.className="mt-4 p-3 bg-green-50 rounded-lg",n.textContent=`✅ ${a.message}`,setTimeout(updateDashboard,2e3)}catch(t){console.error("Action error:",t),e.className="mt-4 p-3 bg-red-50 rounded-lg",n.textContent=`❌ Error: ${t.message}`}e.classList.remove("hidden")}setInterval(updateDashboard,3e4),updateDashboard(),document.getElementById("status").textContent="Connecting to backend...",document.getElementById("status").className="px-2 py-1 bg-blue-100 text-blue-800 rounded-full"</script></body></html>
