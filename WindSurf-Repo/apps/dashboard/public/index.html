<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYOS Command Center - Simple Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <header class="bg-white rounded-lg shadow p-6 mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">🚀 BYOS Command Center</h1>
            <p class="text-gray-600">Enterprise-grade system monitoring and control</p>
            <div class="mt-4 flex items-center space-x-4 text-sm">
                <span id="status" class="px-2 py-1 bg-green-100 text-green-800 rounded-full">Loading...</span>
                <span id="last-updated" class="text-gray-500">Last updated: Never</span>
            </div>
        </header>

        <!-- System Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">Total Users</h3>
                        <p id="total-users" class="text-3xl font-bold text-blue-600">0</p>
                    </div>
                    <div class="text-4xl">👥</div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">Active Workspaces</h3>
                        <p id="active-workspaces" class="text-3xl font-bold text-green-600">0</p>
                    </div>
                    <div class="text-4xl">🏢</div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">Running Apps</h3>
                        <p id="running-apps" class="text-3xl font-bold text-purple-600">0</p>
                    </div>
                    <div class="text-4xl">📱</div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">System Health</h3>
                        <p id="system-health" class="text-3xl font-bold text-red-600">0%</p>
                    </div>
                    <div class="text-4xl">❤️</div>
                </div>
            </div>
        </div>

        <!-- Service Status -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">🔧 System Services</h2>
            <div id="services-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="animate-pulse">
                    <div class="h-20 bg-gray-200 rounded"></div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">⚡ Quick Actions</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="executeAction('restart-api')" class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 transition-colors">
                    🔄 Restart API Server
                </button>
                <button onclick="executeAction('clear-cache')" class="bg-yellow-600 text-white px-4 py-3 rounded-lg hover:bg-yellow-700 transition-colors">
                    🧹 Clear Redis Cache
                </button>
                <button onclick="executeAction('backup-db')" class="bg-green-600 text-white px-4 py-3 rounded-lg hover:bg-green-700 transition-colors">
                    💾 Database Backup
                </button>
                <button onclick="executeAction('maintenance-mode')" class="bg-red-600 text-white px-4 py-3 rounded-lg hover:bg-red-700 transition-colors">
                    🚧 Maintenance Mode
                </button>
            </div>
            <div id="action-result" class="mt-4 p-3 bg-gray-50 rounded-lg hidden">
                <p id="action-message" class="text-sm"></p>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">📝 Recent Activity</h2>
            <div id="activity-list" class="space-y-3">
                <div class="animate-pulse">
                    <div class="h-16 bg-gray-200 rounded"></div>
                    <div class="h-16 bg-gray-200 rounded"></div>
                    <div class="h-16 bg-gray-200 rounded"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8765/api/v1';

        // Update dashboard data
        async function updateDashboard() {
            try {
                document.getElementById('status').textContent = 'Loading...';
                document.getElementById('status').className = 'px-2 py-1 bg-yellow-100 text-yellow-800 rounded-full';

                // Fetch stats
                const statsResponse = await fetch(`${API_BASE}/dashboard/stats`);
                const stats = await statsResponse.json();

                document.getElementById('total-users').textContent = stats.totalUsers.toLocaleString();
                document.getElementById('active-workspaces').textContent = stats.activeWorkspaces;
                document.getElementById('running-apps').textContent = stats.runningApps;
                document.getElementById('system-health').textContent = `${stats.systemHealth}%`;

                // Fetch services
                const servicesResponse = await fetch(`${API_BASE}/dashboard/system-status`);
                const servicesData = await servicesResponse.json();

                const servicesList = document.getElementById('services-list');
                servicesList.innerHTML = servicesData.services.map(service => `
                    <div class="p-4 border border-gray-200 rounded-lg">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="font-medium text-gray-900">${service.name}</h3>
                            <span class="px-2 py-1 text-xs rounded-full ${
                                service.status === 'healthy' ? 'bg-green-100 text-green-800' :
                                service.status === 'warning' ? 'bg-yellow-100 text-yellow-800' :
                                'bg-red-100 text-red-800'
                            }">${service.status.toUpperCase()}</span>
                        </div>
                        <p class="text-sm text-gray-600">Uptime: ${service.uptime}</p>
                        <p class="text-xs text-gray-500 mt-1">Last check: ${new Date(service.lastCheck).toLocaleString()}</p>
                    </div>
                `).join('');

                // Fetch activity
                const activityResponse = await fetch(`${API_BASE}/dashboard/recent-activity`);
                const activityData = await activityResponse.json();

                const activityList = document.getElementById('activity-list');
                activityList.innerHTML = activityData.activities.map(activity => `
                    <div class="flex items-start space-x-3 p-3 hover:bg-gray-50 rounded-lg transition-colors">
                        <div class="text-2xl flex-shrink-0">${getActivityIcon(activity.type)}</div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center space-x-2 mb-1">
                                <p class="text-sm font-medium text-gray-900 truncate">${activity.user}</p>
                                <span class="px-2 py-1 text-xs rounded-full ${
                                    activity.severity === 'high' ? 'bg-red-100 text-red-800' :
                                    activity.severity === 'medium' ? 'bg-yellow-100 text-yellow-800' :
                                    'bg-green-100 text-green-800'
                                }">${activity.severity.toUpperCase()}</span>
                            </div>
                            <p class="text-sm text-gray-700 mb-1">${activity.action}</p>
                            <div class="flex items-center space-x-2 text-xs text-gray-500">
                                <span>🏢 ${activity.workspace}</span>
                                <span>•</span>
                                <span>${new Date(activity.timestamp).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('status').textContent = 'Online';
                document.getElementById('status').className = 'px-2 py-1 bg-green-100 text-green-800 rounded-full';
                document.getElementById('last-updated').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

            } catch (error) {
                console.error('Error updating dashboard:', error);
                document.getElementById('status').textContent = 'Error';
                document.getElementById('status').className = 'px-2 py-1 bg-red-100 text-red-800 rounded-full';
                document.getElementById('last-updated').textContent = `Error: ${error.message}`;
            }
        }

        function switchToIDE() {
            // In a real IDE integration, this might close the browser tab
            // For now, show instructions
            alert('To switch back to IDE:\n\n1. Close this browser tab\n2. Return to your IDE\n3. The code files are ready for editing\n\nYour BYOS Command Center will continue running in the background.');
        }

        function openAPIDocs() {
            window.open('http://localhost:8765/docs', '_blank');
        }

        function openBrowser() {
            // Refresh the current dashboard or open in new tab
            window.location.reload();
        }

        async function executeAction(actionId) {
            const resultDiv = document.getElementById('action-result');
            const messageDiv = document.getElementById('action-message');

            try {
                resultDiv.className = 'mt-4 p-3 bg-yellow-50 rounded-lg';
                messageDiv.textContent = 'Executing action...';

                const response = await fetch(`${API_BASE}/dashboard/system-controls/${actionId}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    resultDiv.className = 'mt-4 p-3 bg-green-50 rounded-lg';
                    messageDiv.textContent = `✅ ${result.message}`;
                } else {
                    throw new Error(result.detail || 'Action failed');
                }

                // Refresh data after action
                setTimeout(updateDashboard, 2000);

            } catch (error) {
                console.error('Action error:', error);
                resultDiv.className = 'mt-4 p-3 bg-red-50 rounded-lg';
                messageDiv.textContent = `❌ Error: ${error.message}`;
            }

            resultDiv.classList.remove('hidden');
        }

        // Auto-refresh every 30 seconds
        setInterval(updateDashboard, 30000);

        // Initial load
        updateDashboard();

        // Show loading message
        document.getElementById('status').textContent = 'Connecting to backend...';
        document.getElementById('status').className = 'px-2 py-1 bg-blue-100 text-blue-800 rounded-full';
    </script>
</body>
</html>
