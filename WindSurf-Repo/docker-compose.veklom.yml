version: '3.8'

# GoonVault Production Stack — veklom.dev
# Lean: postgres + redis + api + caddy (auto-HTTPS)
# Run: docker compose -f docker-compose.veklom.yml up -d

services:

  postgres:
    image: postgres:15-alpine
    container_name: goonvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goonvault_prod
      POSTGRES_USER: goonvault_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goonvault
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goonvault_user -d goonvault_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goonvault-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - goonvault
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: goonvault-api
    restart: unless-stopped
    environment:
      # ── Core ───────────────────────────────────────────────
      APP_NAME: "GoonVault"
      DEBUG: "false"
      ENVIRONMENT: production
      API_PREFIX: /api/v1
      SECRET_KEY: ${SECRET_KEY}
      AI_CITIZENSHIP_SECRET: ${AI_CITIZENSHIP_SECRET}

      # ── URLs ───────────────────────────────────────────────
      FRONTEND_URL: https://veklom.dev
      API_URL: https://veklom.dev

      # ── Database ───────────────────────────────────────────
      DATABASE_URL: postgresql://goonvault_user:${POSTGRES_PASSWORD}@postgres:5432/goonvault_prod

      # ── Redis ──────────────────────────────────────────────
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0

      # ── CORS ───────────────────────────────────────────────
      CORS_ORIGINS: '["https://veklom.dev","https://www.veklom.dev"]'
      CORS_ALLOW_CREDENTIALS: "true"

      # ── Stripe ─────────────────────────────────────────────
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # ── AI (optional) ──────────────────────────────────────
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL_DEFAULT: ${LLM_MODEL_DEFAULT:-qwen2.5:1.5b}

      # ── Security ───────────────────────────────────────────
      ENABLE_MFA: "false"
      PASSWORD_MIN_LENGTH: "8"
      MAX_FAILED_LOGIN_ATTEMPTS: "10"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static:/app/static
    networks:
      - goonvault
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
      alembic upgrade head 2>/dev/null || true &&
      exec uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --workers 2 --access-log --log-level info
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: goonvault-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - goonvault
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  goonvault:
    driver: bridge
