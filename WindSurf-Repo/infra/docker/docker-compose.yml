services:
  # Core Services (always run)
  postgres:
    image: postgres:15-alpine
    container_name: byos-backend-postgres-1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: byos_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - byos-network

  redis:
    image: redis:7-alpine
    container_name: byos-backend-redis-1
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - byos-network

  minio:
    image: minio/minio:latest
    container_name: byos-backend-minio-1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - byos-network

  # API Service
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: byos-backend-api-1
    profiles:
      - api
      - all
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/byos_ai
      # Redis
      REDIS_URL: redis://redis:6379/0
      # S3/MinIO
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: byos-ai
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Security - MUST be set in .env file
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-env-var}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # Debug mode - set to true for development
      DEBUG: ${DEBUG:-false}
      # AI Providers
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Local AI (optional)
      LOCAL_WHISPER_URL: ${LOCAL_WHISPER_URL:-}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-}
      # Alert channels (optional but recommended)
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_INTEGRATION_KEY: ${PAGERDUTY_INTEGRATION_KEY:-}
      # Cost caps
      GLOBAL_DAILY_COST_CAP: ${GLOBAL_DAILY_COST_CAP:-10000}
      DEFAULT_WORKSPACE_DAILY_CAP: ${DEFAULT_WORKSPACE_DAILY_CAP:-1000}
      COST_KILL_SWITCH_ENABLED: ${COST_KILL_SWITCH_ENABLED:-true}
    ports:
      - "8000:8000"
    volumes:
      - ../../:/app
    networks:
      - byos-network
    restart: unless-stopped

  # Worker Service
  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: byos-backend-worker-1
    profiles:
      - worker
      - all
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/byos_ai
      # Redis
      REDIS_URL: redis://redis:6379/0
      # S3/MinIO
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: byos-ai
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      # Celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Security
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-env-var}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # AI Providers
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Local AI (optional)
      LOCAL_WHISPER_URL: ${LOCAL_WHISPER_URL:-}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-}
    volumes:
      - ../../:/app
    networks:
      - byos-network
    restart: unless-stopped

  # Caddy Reverse Proxy (optional)
  caddy:
    image: caddy:2-alpine
    container_name: byos-backend-caddy-1
    profiles:
      - caddy
      - all
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - byos-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  byos-network:
    driver: bridge
