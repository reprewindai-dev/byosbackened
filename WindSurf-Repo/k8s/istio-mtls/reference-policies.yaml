---
apiVersion: v1
kind: Namespace
metadata:
  name: seked
  labels:
    istio-injection: "enabled"
    name: seked
---
apiVersion: v1
kind: Namespace
metadata:
  name: seked-tenants
  labels:
    istio-injection: "enabled"
    name: seked-tenants
---
# PeerAuthentication for STRICT mTLS in Seked namespace
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: seked-mtls
  namespace: seked
spec:
  mtls:
    mode: STRICT
---
# AuthorizationPolicy: API Gateway ingress (external access)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-api-gateway-ingress
  namespace: seked
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-api-gateway
  action: ALLOW
  rules:
  - from:
    - source:
        notPrincipals: ["spiffe://cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        paths: ["/api/v1/*"]
---
# AuthorizationPolicy: Policy Engine (only from API Gateway)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-policy-engine-access
  namespace: seked
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-policy-engine
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["spiffe://cluster.local/ns/seked/sa/seked-api-gateway"]
    to:
    - operation:
        methods: ["POST"]
        paths: ["/internal/policy/evaluate", "/internal/policy/decide"]
---
# AuthorizationPolicy: Audit Service (only from Policy Engine and Consensus Engine)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-audit-service-access
  namespace: seked
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-audit-service
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "spiffe://cluster.local/ns/seked/sa/seked-policy-engine"
        - "spiffe://cluster.local/ns/seked/sa/seked-consensus-engine"
    to:
    - operation:
        methods: ["POST"]
        paths: ["/internal/audit/record", "/internal/audit/batch"]
---
# AuthorizationPolicy: Consensus Engine (only from Policy Engine)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-consensus-engine-access
  namespace: seked
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-consensus-engine
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["spiffe://cluster.local/ns/seked/sa/seked-policy-engine"]
    to:
    - operation:
        methods: ["POST"]
        paths: ["/internal/consensus/propose", "/internal/consensus/verify"]
---
# AuthorizationPolicy: Citizenship Service (only from API Gateway and Policy Engine)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-citizenship-service-access
  namespace: seked
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-citizenship-service
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "spiffe://cluster.local/ns/seked/sa/seked-api-gateway"
        - "spiffe://cluster.local/ns/seked/sa/seked-policy-engine"
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
        paths: ["/internal/citizenship/*"]
---
# AuthorizationPolicy: Tenant access to Seked API Gateway
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-tenant-access
  namespace: seked
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-api-gateway
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["seked-tenants"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        paths: ["/api/v1/*"]
---
# DestinationRule for internal mTLS (ISTIO_MUTUAL)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: seked-internal-mtls
  namespace: seked
spec:
  host: "*.seked.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
# Gateway for external access (mTLS termination)
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: seked-external-gateway
  namespace: seked
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: MUTUAL
      credentialName: seked-gateway-tls
    hosts:
    - "api.seked.example.com"
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "api.seked.example.com"
---
# VirtualService for API routing
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: seked-api-routing
  namespace: seked
spec:
  hosts:
  - "api.seked.example.com"
  gateways:
  - seked/seked-external-gateway
  http:
  - match:
    - uri:
        prefix: "/api/v1"
    route:
    - destination:
        host: seked-api-gateway.seked.svc.cluster.local
        port:
          number: 8080
  - match:
    - uri:
        prefix: "/health"
    route:
    - destination:
        host: seked-api-gateway.seked.svc.cluster.local
        port:
          number: 8080
---
# RequestAuthentication for JWT validation (optional)
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: seked-jwt-auth
  namespace: seked
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-api-gateway
  jwtRules:
  - issuer: "https://seked-auth.example.com"
    jwksUri: "https://seked-auth.example.com/.well-known/jwks.json"
    forwardOriginalToken: true
---
# ServiceEntry for external audit ledger (if needed)
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-audit-ledger
  namespace: seked
spec:
  hosts:
  - "ledger.seked-chain.example.com"
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  resolution: DNS
  endpoints:
  - address: "ledger.seked-chain.example.com"
---
# DestinationRule for external ledger mTLS
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: external-ledger-mtls
  namespace: seked
spec:
  host: ledger.seked-chain.example.com
  trafficPolicy:
    tls:
      mode: MUTUAL
      clientCertificate: /etc/istio/certs/client.crt
      privateKey: /etc/istio/certs/client.key
      caCertificates: /etc/istio/certs/ca.crt
