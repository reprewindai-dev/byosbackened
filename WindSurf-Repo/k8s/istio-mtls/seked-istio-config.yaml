apiVersion: v1
kind: Namespace
metadata:
  name: seked-system
  labels:
    istio-injection: enabled
    name: seked-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: seked-tenants
  labels:
    istio-injection: enabled
    name: seked-tenants
---
# Istio PeerAuthentication for STRICT mTLS across the mesh
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: STRICT
---
# Seked-specific PeerAuthentication (can override for gradual rollout)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: seked-mtls-strict
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: seked
  mtls:
    mode: STRICT
---
# AuthorizationPolicy for API Gateway ingress
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-api-gateway-ingress
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-api-gateway
  action: ALLOW
  rules:
  - from:
    - source:
        notPrincipals: ["spiffe://cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        paths: ["/api/v1/*"]
---
# AuthorizationPolicy for Policy Engine (only from API Gateway)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-policy-engine-access
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-policy-engine
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["spiffe://cluster.local/ns/seked-system/sa/seked-api-gateway"]
    to:
    - operation:
        methods: ["POST"]
        paths: ["/internal/policy/evaluate", "/internal/policy/decide"]
---
# AuthorizationPolicy for Audit Service (only from Policy Engine and internal services)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-audit-service-access
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-audit-service
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "spiffe://cluster.local/ns/seked-system/sa/seked-policy-engine"
        - "spiffe://cluster.local/ns/seked-system/sa/seked-consensus-engine"
        - "spiffe://cluster.local/ns/seked-system/sa/seked-citizenship-service"
    to:
    - operation:
        methods: ["POST"]
        paths: ["/internal/audit/record", "/internal/audit/batch"]
---
# AuthorizationPolicy for Consensus Engine (only from Policy Engine)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-consensus-engine-access
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-consensus-engine
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["spiffe://cluster.local/ns/seked-system/sa/seked-policy-engine"]
    to:
    - operation:
        methods: ["POST"]
        paths: ["/internal/consensus/propose", "/internal/consensus/verify"]
---
# AuthorizationPolicy for Citizenship Service (only from API Gateway and Policy Engine)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-citizenship-service-access
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-citizenship-service
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        - "spiffe://cluster.local/ns/seked-system/sa/seked-api-gateway"
        - "spiffe://cluster.local/ns/seked-system/sa/seked-policy-engine"
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
        paths: ["/internal/citizenship/*"]
---
# AuthorizationPolicy for tenant access to Seked API Gateway
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: seked-tenant-access
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-api-gateway
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["seked-tenants"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        paths: ["/api/v1/*"]
---
# RequestAuthentication for JWT token validation (if using external auth)
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: seked-jwt-auth
  namespace: seked-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seked-api-gateway
  jwtRules:
  - issuer: "seked-auth-service"
    jwksUri: "https://seked-auth.seked-system.svc.cluster.local/.well-known/jwks.json"
    forwardOriginalToken: true
---
# Gateway for external access (with mTLS termination)
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: seked-gateway
  namespace: seked-system
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: MUTUAL
      credentialName: seked-gateway-tls
    hosts:
    - "seked.example.com"
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "seked.example.com"
---
# VirtualService for API routing
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: seked-api
  namespace: seked-system
spec:
  hosts:
  - "seked.example.com"
  gateways:
  - seked-gateway
  http:
  - match:
    - uri:
        prefix: "/api/v1"
    route:
    - destination:
        host: seked-api-gateway.seked-system.svc.cluster.local
        port:
          number: 8080
  - match:
    - uri:
        prefix: "/health"
    route:
    - destination:
        host: seked-api-gateway.seked-system.svc.cluster.local
        port:
          number: 8080
---
# ServiceEntry for external services (if needed)
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-audit-ledger
  namespace: seked-system
spec:
  hosts:
  - "ledger.external.com"
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  resolution: DNS
  endpoints:
  - address: "ledger.external.com"
---
# DestinationRule for external mTLS (if required)
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: external-ledger-mtls
  namespace: seked-system
spec:
  host: ledger.external.com
  trafficPolicy:
    tls:
      mode: MUTUAL
      clientCertificate: /etc/istio/certs/client.crt
      privateKey: /etc/istio/certs/client.key
      caCertificates: /etc/istio/certs/ca.crt
