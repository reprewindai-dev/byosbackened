<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Research Lab — Admin</title>
<style>
  :root{
    --bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3e;
    --accent:#9b4dff;--accent2:#ff4da6;--text:#e8e8f0;--muted:#7a7a9a;
    --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

  /* ── Top bar ── */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  .logo{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .badge{background:#1e1e2e;border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:.7rem;color:var(--muted);letter-spacing:.05em}
  .sources{display:flex;gap:8px;margin-left:auto;align-items:center}
  .logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:8px;font-size:.72rem;cursor:pointer;margin-left:12px}
  .logout-btn:hover{border-color:var(--red);color:var(--red)}

  /* ── Login overlay ── */
  #login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center}
  #login-overlay.show{display:flex}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:38px 32px;width:340px;text-align:center}
  .login-logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
  .login-sub{font-size:.78rem;color:var(--muted);margin-bottom:26px}
  .login-field{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:.88rem;outline:none;margin-bottom:12px;font-family:inherit}
  .login-field:focus{border-color:var(--accent)}
  .login-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:11px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px}
  .login-err{color:var(--red);font-size:.78rem;margin-top:10px;min-height:18px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .dot.online{background:var(--green)}
  .dot.offline{background:var(--red)}
  .src-label{font-size:.7rem;color:var(--muted)}

  /* ── Layout ── */
  .layout{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 53px)}

  /* ── Sidebar ── */
  aside{background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto}
  .sidebar-title{font-size:.65rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  .niche-pill{display:block;width:100%;text-align:left;background:none;border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:.82rem;transition:all .15s}
  .niche-pill:hover,.niche-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .trending-tag{display:inline-block;background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:.72rem;color:var(--muted);margin:3px;cursor:pointer;transition:all .15s}
  .trending-tag:hover{border-color:var(--accent);color:var(--accent)}

  /* ── Main ── */
  main{overflow-y:auto;padding:20px}

  /* ── Search bar ── */
  .search-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search-wrap{flex:1;min-width:220px;position:relative}
  .search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:10px;font-size:.9rem;outline:none;transition:border-color .15s}
  .search-wrap input:focus{border-color:var(--accent)}
  select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-size:.85rem;outline:none;cursor:pointer}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:10px 22px;border-radius:10px;font-size:.85rem;cursor:pointer;font-weight:600;white-space:nowrap}
  .btn:hover{opacity:.9}
  .btn-sm{padding:6px 14px;font-size:.78rem;border-radius:8px}

  /* ── Stats bar ── */
  .stats-bar{display:flex;gap:16px;margin-bottom:16px;font-size:.78rem;color:var(--muted)}
  .stat-item span{color:var(--text);font-weight:600}

  /* ── Grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
  .card:hover{transform:translateY(-3px);border-color:var(--accent)}
  .thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000}
  .thumb-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
  .card:hover .thumb-wrap img{transform:scale(1.06)}
  .thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--surface);color:var(--muted);font-size:2rem}
  .duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);padding:2px 6px;border-radius:4px;font-size:.68rem;color:#fff}
  .source-badge{position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:4px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .badge-pornhub{background:#f90;color:#000}
  .badge-xhamster{background:#e8612c;color:#fff}
  .badge-lustpress{background:#9b4dff;color:#fff}
  .badge-redtube{background:#cc0000;color:#fff}
  .badge-nsfw-api2{background:#22c55e;color:#000}
  .badge-unknown{background:#444;color:#fff}
  .card-body{padding:10px}
  .card-title{font-size:.8rem;font-weight:600;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-meta{display:flex;gap:8px;font-size:.68rem;color:var(--muted)}

  /* ── Modal ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(900px,100%);max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
  .modal-header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
  .modal-title{flex:1;font-size:.9rem;font-weight:600}
  .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;line-height:1;padding:4px}
  .close-btn:hover{color:var(--text)}
  .modal-player{position:relative;aspect-ratio:16/9;background:#000}
  .modal-player iframe{width:100%;height:100%;border:none}
  .modal-player .no-embed{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted)}
  .open-source-btn{background:var(--accent);color:#fff;border:none;padding:10px 22px;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600}
  .modal-info{padding:14px 18px;display:flex;gap:16px;flex-wrap:wrap}
  .info-item{font-size:.78rem;color:var(--muted)}
  .info-item span{color:var(--text);font-weight:600}
  .tags-row{padding:0 18px 14px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:.7rem;color:var(--muted)}

  /* ── Empty / Loading ── */
  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty .icon{font-size:3rem;margin-bottom:12px}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-overlay{display:none;position:absolute;inset:0;background:rgba(10,10,15,.7);z-index:50;align-items:center;justify-content:center;border-radius:12px}
  .loading-overlay.show{display:flex}

  /* ── Toast ── */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);padding:10px 18px;border-radius:10px;font-size:.82rem;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s}
  .toast.show{transform:translateY(0);opacity:1}

  @media(max-width:640px){.layout{grid-template-columns:1fr}aside{display:none}.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">🔬 Research Lab</div>
  <div class="badge">ADMIN ONLY</div>
  <div class="sources" id="sources-row">
    <div class="src-label">Loading sources…</div>
  </div>
  <button class="logout-btn" onclick="doLogout()">Sign Out</button>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-title">Quick Niches</div>
    <button class="niche-pill active" data-niche="lesbian">💜 Lesbian</button>
    <button class="niche-pill" data-niche="squirting">💦 Squirting</button>
    <button class="niche-pill" data-niche="masturbation">🔥 Masturbation</button>
    <button class="niche-pill" data-niche="gooning">🌀 Gooning</button>
    <button class="niche-pill" data-niche="goonette">💫 Goonette</button>
    <button class="niche-pill" data-niche="hypno">🌀 Hypno</button>
    <button class="niche-pill" data-niche="pmv">🎵 PMV</button>
    <button class="niche-pill" data-niche="brainrot">🧠 Brain Rot</button>
    <button class="niche-pill" data-niche="solo female">👤 Solo Female</button>
    <button class="niche-pill" data-niche="orgasm">✨ Orgasm</button>

    <div class="sidebar-title" style="margin-top:20px">Trending Tags</div>
    <div id="trending-tags"><div class="spinner"></div></div>
  </aside>

  <!-- Main -->
  <main>
    <!-- Search row -->
    <div class="search-row">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search videos…" value="lesbian"/>
      </div>
      <select id="source-select">
        <option value="all">All Sources</option>
        <option value="pornhub">PornHub</option>
        <option value="xhamster">XHamster</option>
        <option value="lustpress">LustPress</option>
        <option value="redtube">RedTube</option>
        <option value="nsfw-api2">NSFW-API2</option>
      </select>
      <select id="limit-select">
        <option value="20">20 results</option>
        <option value="40" selected>40 results</option>
        <option value="80">80 results</option>
      </select>
      <button class="btn" id="search-btn">Search</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat-item">Results: <span id="stat-count">0</span></div>
      <div class="stat-item">Query: <span id="stat-query">—</span></div>
      <div class="stat-item">Source: <span id="stat-source">—</span></div>
    </div>

    <!-- Grid -->
    <div style="position:relative;min-height:200px">
      <div class="loading-overlay" id="loading"><div class="spinner"></div></div>
      <div class="grid" id="results-grid">
        <div class="empty" style="grid-column:1/-1">
          <div class="icon">🔍</div>
          <div>Search for content above to begin research</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Video Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="close-btn" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-player" id="modal-player">
      <div class="no-embed" id="no-embed" style="display:none">
        <div style="font-size:1.5rem">▶️</div>
        <div>No embed available — opens on source site</div>
        <button class="open-source-btn" id="open-source-btn">Open on Source Site</button>
      </div>
    </div>
    <div class="modal-info">
      <div class="info-item">Views: <span id="modal-views">—</span></div>
      <div class="info-item">Duration: <span id="modal-duration">—</span></div>
      <div class="info-item">Source: <span id="modal-source">—</span></div>
      <div class="info-item">Rating: <span id="modal-rating">—</span></div>
    </div>
    <div class="tags-row" id="modal-tags"></div>
  </div>
</div>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">🔬 Research Lab</div>
    <div class="login-sub">Admin access only</div>
    <input class="login-field" type="email" id="login-email" placeholder="Admin email" autocomplete="username"/>
    <input class="login-field" type="password" id="login-pass" placeholder="Password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '/api/v1';
let token = localStorage.getItem('admin_token') || '';

// ── Login overlay ─────────────────────────────────────────────────────────────
function showLogin() { document.getElementById('login-overlay').classList.add('show'); }
function hideLogin() { document.getElementById('login-overlay').classList.remove('show'); }

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Enter email and password'; return; }

  try {
    const r = await fetch(`${API}/auth/login-json`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass })
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.detail || 'Login failed'; return; }
    token = data.access_token || data.token || '';
    if (!token) { errEl.textContent = 'No token in response'; return; }
    localStorage.setItem('admin_token', token);
    hideLogin();
    loadSources(); loadTrending(); doSearch('lesbian', 'all');
  } catch(e) { errEl.textContent = 'Network error — is the server running?'; }
}

function doLogout() {
  localStorage.removeItem('admin_token');
  token = '';
  showLogin();
  document.getElementById('results-grid').innerHTML = '';
  document.getElementById('stats-bar').style.display = 'none';
}

if (!token) {
  showLogin();
} else {
  // Validate stored token quickly
  fetch(`${API}/admin/research/sources`, { headers: {'Authorization':'Bearer '+token} })
    .then(r => { if (r.status === 401) { localStorage.removeItem('admin_token'); token=''; showLogin(); } })
    .catch(() => {});
}

const headers = () => ({ 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' });

// ── Source health ───────────────────────────────────────────────────────────
async function loadSources() {
  try {
    const r = await fetch(`${API}/admin/research/sources`, { headers: headers() });
    const data = await r.json();
    const row = document.getElementById('sources-row');
    row.innerHTML = data.map(s => `
      <div style="display:flex;align-items:center;gap:5px">
        <div class="dot ${s.online ? 'online' : 'offline'}"></div>
        <span class="src-label">${s.name}${s.latency_ms ? ` ${Math.round(s.latency_ms)}ms` : ''}</span>
      </div>
    `).join('');
  } catch(e) { console.warn('sources error', e); }
}

// ── Trending tags ────────────────────────────────────────────────────────────
async function loadTrending() {
  try {
    const r = await fetch(`${API}/admin/research/trending`, { headers: headers() });
    const data = await r.json();
    const el = document.getElementById('trending-tags');
    el.innerHTML = (data.tags || []).map(t =>
      `<span class="trending-tag" onclick="quickSearch('${t.tag}')">${t.tag}</span>`
    ).join('');
  } catch(e) { document.getElementById('trending-tags').innerHTML = '<span style="color:var(--muted);font-size:.75rem">unavailable</span>'; }
}

// ── Search ───────────────────────────────────────────────────────────────────
async function doSearch(query, source) {
  if (!query) return;
  const limit = parseInt(document.getElementById('limit-select').value);
  const loading = document.getElementById('loading');
  loading.classList.add('show');
  document.getElementById('results-grid').innerHTML = '';
  document.getElementById('stats-bar').style.display = 'none';

  try {
    const r = await fetch(`${API}/admin/research/search`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ query, source: source || 'all', limit })
    });
    if (r.status === 401) { showToast('Session expired — please sign in again'); localStorage.removeItem('admin_token'); token=''; showLogin(); return; }
    if (!r.ok) { const e = await r.json(); showToast('Error: ' + (e.detail || r.statusText)); return; }
    const data = await r.json();
    renderResults(data);
  } catch(e) {
    showToast('Network error: ' + e.message);
  } finally {
    loading.classList.remove('show');
  }
}

function renderResults(data) {
  const grid = document.getElementById('results-grid');
  const bar = document.getElementById('stats-bar');
  document.getElementById('stat-count').textContent = data.total;
  document.getElementById('stat-query').textContent = data.query;
  document.getElementById('stat-source').textContent = data.source;
  bar.style.display = 'flex';

  if (!data.results?.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="icon">😶</div><div>No results — try different query or source</div></div>';
    return;
  }

  grid.innerHTML = data.results.map((v, i) => {
    const src = v.source || v.source_api || 'unknown';
    const dur = fmtDuration(v.duration);
    const views = fmtViews(v.views);
    const thumb = v.thumbnail || '';
    return `
    <div class="card" onclick="openModal(${i})" data-index="${i}">
      <div class="thumb-wrap">
        ${thumb
          ? `<img src="${thumb}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>🎬</div>'">`
          : '<div class="thumb-placeholder">🎬</div>'}
        <div class="source-badge badge-${src}">${src}</div>
        ${dur ? `<div class="duration">${dur}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${esc(v.title || 'Untitled')}</div>
        <div class="card-meta">
          ${views ? `<span>👁 ${views}</span>` : ''}
          ${v.rating ? `<span>⭐ ${v.rating}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  window._results = data.results;
}

// ── Modal ────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const v = window._results?.[idx];
  if (!v) return;
  const modal = document.getElementById('modal');
  const player = document.getElementById('modal-player');
  const noEmbed = document.getElementById('no-embed');

  document.getElementById('modal-title').textContent = v.title || 'Video';
  document.getElementById('modal-views').textContent = fmtViews(v.views) || '—';
  document.getElementById('modal-duration').textContent = fmtDuration(v.duration) || '—';
  document.getElementById('modal-source').textContent = (v.source || v.source_api || '—').toUpperCase();
  document.getElementById('modal-rating').textContent = v.rating ? `${v.rating}/10` : '—';

  const tags = document.getElementById('modal-tags');
  tags.innerHTML = (v.tags || []).slice(0,15).map(t => `<span class="tag">${esc(t)}</span>`).join('');

  // Remove old iframe
  const oldIframe = player.querySelector('iframe');
  if (oldIframe) oldIframe.remove();
  noEmbed.style.display = 'none';

  if (v.embed_url) {
    const iframe = document.createElement('iframe');
    iframe.src = v.embed_url;
    iframe.allowFullscreen = true;
    iframe.setAttribute('allow', 'autoplay; fullscreen');
    iframe.style.cssText = 'width:100%;height:100%;border:none;position:absolute;inset:0';
    player.style.position = 'relative';
    player.appendChild(iframe);
  } else {
    noEmbed.style.display = 'flex';
    document.getElementById('open-source-btn').onclick = () => window.open(v.url, '_blank');
  }

  modal.classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
  const iframe = document.getElementById('modal-player').querySelector('iframe');
  if (iframe) iframe.src = ''; // stop video playback
}

// ── Niche pills ──────────────────────────────────────────────────────────────
document.querySelectorAll('.niche-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.niche-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const niche = btn.dataset.niche;
    document.getElementById('search-input').value = niche;
    doSearch(niche, document.getElementById('source-select').value);
  });
});

function quickSearch(tag) {
  document.getElementById('search-input').value = tag;
  doSearch(tag, document.getElementById('source-select').value);
}

// ── Search button / enter ────────────────────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', () => {
  doSearch(document.getElementById('search-input').value, document.getElementById('source-select').value);
});
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('search-btn').click();
});

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDuration(secs) {
  if (!secs) return '';
  const m = Math.floor(secs/60), s = secs%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtViews(v) {
  if (!v) return '';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return String(v);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
