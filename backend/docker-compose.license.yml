version: '3.8'

services:
  license-server:
    build:
      context: .
      dockerfile: Dockerfile.license
    container_name: veklom-license-server
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env.license
    environment:
      - DATABASE_URL=sqlite:////data/license.db
      - APP_VERSION=1.0.0
    volumes:
      - license_data:/data
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.license-server.rule=Host(`license.veklom.com`)"
      - "traefik.http.routers.license-server.tls=true"
      - "traefik.http.routers.license-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.license-server.loadbalancer.server.port=8000"

volumes:
  license_data:
    driver: local

networks:
  coolify:
    external: true
