version: '3.9'

# BYOS AI + Security Suite — Production Docker Compose
# Full stack: API + Worker + Beat + Postgres + Redis + MinIO + Nginx + Prometheus + Grafana + Loki
# Deploy: docker compose -f docker-compose.prod.yml up -d

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: byos_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-byos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-byos_ai}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-byos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - byos_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: byos_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - byos_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: byos_minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - byos_net
    restart: unless-stopped

  # ── Application Services ─────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: byos_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-byos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-byos_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      LLM_BASE_URL: http://host.docker.internal:11434
      LLM_MODEL_DEFAULT: ${LLM_MODEL_DEFAULT:-llama3.2:1b}
      LLM_FALLBACK: "off"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - byos_net
    restart: unless-stopped
    volumes:
      - app_logs:/app/logs

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: byos_worker
    command: celery -A apps.worker.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-byos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-byos_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - byos_net
    restart: unless-stopped
    volumes:
      - app_logs:/app/logs

  beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: byos_beat
    command: celery -A apps.worker.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-byos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-byos_ai}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - byos_net
    restart: unless-stopped

  # ── Reverse Proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: byos_nginx
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - byos_net
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: byos_certbot
    volumes:
      - ./infra/nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: byos_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - byos_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: byos_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - byos_net
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: byos_loki
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - byos_net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: byos_promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - app_logs:/var/log/app:ro
      - /var/log:/var/log/host:ro
    depends_on:
      - loki
    networks:
      - byos_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  app_logs:
  certbot_webroot:

networks:
  byos_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
