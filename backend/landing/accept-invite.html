    <title>Accept Veklom Invite</title>
    <script>
      (function () {
        var query = window.location.search || "";
        if (query.indexOf("?token=") === 0) {
          query = "?invite_secret=" + encodeURIComponent(new URLSearchParams(query).get("token") || "");
        }
        window.location.replace("/accept-invite" + query);
      })();
    </script>
