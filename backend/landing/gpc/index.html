    <script>
  (function(){
    const API_ORIGIN = "https://uacpgemini.onrender.com";
    const nativeFetch = window.fetch.bind(window);
    window.fetch = function(input, init){
      const raw = typeof input === "string" ? input : input && input.url;
      if (raw && raw.startsWith("/api/")) return nativeFetch(API_ORIGIN + raw, init);
      return nativeFetch(input, init);
    };
    const NativeWebSocket = window.WebSocket;
    window.WebSocket = function(url, protocols){
      const nextUrl = String(url)
        .replace(/^ws:\/\/[^/]+/i, "wss://uacpgemini.onrender.com")
        .replace(/^wss:\/\/[^/]+/i, "wss://uacpgemini.onrender.com");
      return protocols ? new NativeWebSocket(nextUrl, protocols) : new NativeWebSocket(nextUrl);
    };
    window.WebSocket.prototype = NativeWebSocket.prototype;
  })();
