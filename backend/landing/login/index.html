<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — Veklom</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/app.css">
</head>
<body>
<main class="app-shell">
  <div class="app-brand"><img src="/logo.svg" alt="Veklom" /> Veklom</div>
  <div class="app-card">
    <h1 class="app-h1">Sign in</h1>
    <p class="app-sub">Welcome back. Sign in to manage your workspace, API keys, and subscription.</p>
    <div id="alert"></div>
    <form id="form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
      </div>
      <button class="btn btn-primary btn-block" id="submit" type="submit">Sign in</button>
    </form>
    <p class="foot">No account yet? <a href="/signup/">Create a workspace</a></p>
  </div>
</main>
<script src="/app/auth.js"></script>
<script>
const $alert = document.getElementById("alert");
const $form  = document.getElementById("form");
const $btn   = document.getElementById("submit");

if (VK.isLoggedIn()) { window.location.href = "/dashboard/"; }

$form.addEventListener("submit", async (e) => {
  e.preventDefault();
  $alert.innerHTML = "";
  $btn.disabled = true;
  $btn.innerHTML = '<span class="spinner"></span> Signing in...';
  try {
    await VK.login({
      email: document.getElementById("email").value.trim().toLowerCase(),
      password: document.getElementById("password").value
    });
    window.location.href = "/dashboard/";
  } catch (err) {
    $alert.innerHTML = '<div class="alert alert-error">' + (err.message || "Sign in failed") + '</div>';
    $btn.disabled = false;
    $btn.innerHTML = "Sign in";
  }
});
</script>
</body>
</html>
