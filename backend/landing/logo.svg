<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#c4925b"/>
      <stop offset="100%" stop-color="#a8784a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#c4925b" stop-opacity=".15"/>
      <stop offset="60%" stop-color="#c4925b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="95" fill="url(#glow)"/>

  <!-- outer hairline ring -->
  <circle cx="100" cy="100" r="92" stroke="url(#brass)" stroke-width="0.8" opacity=".55"/>
  <!-- main ring -->
  <circle cx="100" cy="100" r="84" stroke="url(#brass)" stroke-width="2"/>
  <!-- inner ring -->
  <circle cx="100" cy="100" r="74" stroke="url(#brass)" stroke-width="0.6" opacity=".5"/>

  <!-- cardinal ticks -->
  <g stroke="url(#brass)" stroke-width="1.2" stroke-linecap="round">
    <line x1="100" y1="12"  x2="100" y2="20"/>
    <line x1="100" y1="180" x2="100" y2="188"/>
    <line x1="12"  y1="100" x2="20"  y2="100"/>
    <line x1="180" y1="100" x2="188" y2="100"/>
  </g>
  <g stroke="url(#brass)" stroke-width="0.7" stroke-linecap="round" opacity=".7">
    <line x1="144" y1="23.7" x2="148" y2="30.7"/>
    <line x1="170.3" y1="56" x2="177.3" y2="52"/>
    <line x1="170.3" y1="144" x2="177.3" y2="148"/>
    <line x1="144" y1="176.3" x2="148" y2="169.3"/>
    <line x1="56" y1="176.3" x2="52" y2="169.3"/>
    <line x1="29.7" y1="144" x2="22.7" y2="148"/>
    <line x1="29.7" y1="56" x2="22.7" y2="52"/>
    <line x1="56" y1="23.7" x2="52" y2="30.7"/>
  </g>

  <!-- inner perimeter dots -->
  <g fill="url(#brass)" opacity=".55">
    <circle cx="100" cy="32"  r="1.4"/>
    <circle cx="100" cy="168" r="1.4"/>
    <circle cx="32"  cy="100" r="1.4"/>
    <circle cx="168" cy="100" r="1.4"/>
  </g>

  <!-- italic serif V monogram (drawn as path, no font dependency) -->
  <g transform="translate(100 102) rotate(-7)">
    <!-- V: two diagonals meeting at a serif point -->
    <path d="M -32 -32
             L -22 -32
             L -2 18
             L 18 -32
             L 28 -32
             L 6 26
             L -6 26
             Z"
          fill="url(#brass)"/>
    <!-- top-left serif -->
    <rect x="-36" y="-34" width="14" height="3" fill="url(#brass)"/>
    <!-- top-right serif -->
    <rect x="14"  y="-34" width="18" height="3" fill="url(#brass)"/>
    <!-- subtle italic dot accent -->
    <circle cx="22" cy="-26" r="1.5" fill="url(#brass)"/>
  </g>

  <!-- arc text -->
  <defs>
    <path id="arc-top" d="M 30 100 A 70 70 0 0 1 170 100"/>
  </defs>
  <text font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="7" letter-spacing="3" fill="url(#brass)" opacity=".75">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">VEKLOM · SOVEREIGN AI · MMXXVI</textPath>
  </text>
</svg>
