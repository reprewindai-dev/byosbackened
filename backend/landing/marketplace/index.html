<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marketplace - Veklom</title>
<meta name="robots" content="index, follow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/app.css">
<style>
.listing-grid { display:grid; grid-template-columns:1fr; gap:16px; }
@media (min-width: 900px){ .listing-grid{ grid-template-columns:1fr 1fr; } }
.listing-card{ background:var(--ink-2); border:1px solid var(--rule); border-radius:6px; padding:20px; }
.listing-title{ font-family:var(--serif); font-size:26px; margin-bottom:6px; }
.listing-desc{ color:var(--bone-2); font-size:14px; line-height:1.5; min-height:66px; }
.listing-meta{ margin-top:14px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
.listing-price{ font-family:var(--mono); color:var(--brass-2); font-size:13px; }
</style>
</head>
<body>
<main class="app-shell wide">
  <div class="app-topnav">
    <div class="app-brand"><img src="/logo.svg" alt="Veklom" /> Veklom Marketplace</div>
    <div class="links">
      <a href="/">Home</a>
      <a href="/vendor/">Vendors</a>
      <a href="/dashboard/">Dashboard</a>
      <a href="/login/" id="authLink">Sign in</a>
    </div>
  </div>

  <div id="alert"></div>

  <div class="app-card" style="margin-bottom:20px;">
    <h1 class="app-h1">Marketplace Catalog</h1>
    <p class="app-sub">Buy governed listings with Stripe checkout. Only reviewed listings are public.</p>
    <div class="field" style="margin-bottom:0;">
      <label for="search">Search</label>
      <input id="search" type="text" placeholder="Search by title" />
    </div>
  </div>

  <div id="listings" class="listing-grid"></div>
</main>

<script src="/app/auth.js"></script>
<script>
const $alert = document.getElementById("alert");
const $listings = document.getElementById("listings");
const $search = document.getElementById("search");
const $authLink = document.getElementById("authLink");
let allListings = [];

function showError(msg) { $alert.innerHTML = '<div class="alert alert-error">' + msg + '</div>'; }
function showOk(msg) { $alert.innerHTML = '<div class="alert alert-ok">' + msg + '</div>'; }
function fmtPrice(cents, currency) {
  return new Intl.NumberFormat("en-US", { style: "currency", currency: (currency || "usd").toUpperCase() }).format((cents || 0) / 100);
}

if (VK.isLoggedIn()) { $authLink.href = "/dashboard/"; $authLink.textContent = "Workspace"; }

function render() {
  const q = ($search.value || "").trim().toLowerCase();
  const rows = allListings.filter(x => !q || (x.title || "").toLowerCase().includes(q));
  if (!rows.length) {
    $listings.innerHTML = '<div class="app-card full"><p class="muted">No active listings found.</p></div>';
    return;
  }
  $listings.innerHTML = rows.map(x => {
    const locked = !VK.isLoggedIn();
    const btn = locked
      ? '<a class="btn btn-secondary" href="/login/">Sign in to purchase</a>'
      : '<button class="btn btn-primary buy-btn" data-id="' + x.id + '">Buy now</button>';
    return (
      '<article class="listing-card">' +
        '<div class="listing-title">' + x.title + '</div>' +
        '<p class="listing-desc">' + (x.description || "No description") + '</p>' +
        '<div class="listing-meta">' +
          '<span class="listing-price">' + fmtPrice(x.price_cents, x.currency) + '</span>' +
          btn +
        '</div>' +
      '</article>'
    );
  }).join("");

  document.querySelectorAll(".buy-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Starting checkout...';
      try {
        const listingId = btn.getAttribute("data-id");
        const order = await VK.marketplaceCreateOrder({ items: [listingId] });
        const out = await VK.marketplaceCreateCheckout({
          order_id: order.id,
          success_url: window.location.origin + "/marketplace/?checkout=success&order_id=" + encodeURIComponent(order.id),
          cancel_url: window.location.origin + "/marketplace/?checkout=cancel&order_id=" + encodeURIComponent(order.id),
        });
        window.location.href = out.checkout_url;
      } catch (err) {
        showError(err.message || "Checkout failed");
        btn.disabled = false;
        btn.textContent = "Buy now";
      }
    });
  });
}

$search.addEventListener("input", render);

(async function init(){
  const params = new URLSearchParams(window.location.search);
  if (params.get("checkout") === "success") showOk("Payment received. Your order is now active.");
  if (params.get("checkout") === "cancel") showError("Checkout canceled.");
  try {
    allListings = await VK.marketplaceList();
    render();
  } catch (err) {
    showError(err.message || "Failed to load marketplace");
  }
})();
</script>
</body>
</html>
