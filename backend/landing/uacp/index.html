  <script>
(function () {
  var api = "https://uacpgemini.onrender.com";
  var originalFetch = window.fetch.bind(window);
  window.fetch = function (input, init) {
    if (typeof input === "string" && input.indexOf("/api/") === 0) {
      return originalFetch(api + input, init);
    }
    if (input && typeof input.url === "string" && input.url.indexOf(location.origin + "/api/") === 0) {
      return originalFetch(api + input.url.slice(location.origin.length), init);
    }
    return originalFetch(input, init);
  };
  var OriginalWebSocket = window.WebSocket;
  window.WebSocket = function (url, protocols) {
    if (typeof url === "string" && (url.indexOf("ws://") === 0 || url.indexOf("wss://") === 0)) {
      return new OriginalWebSocket("wss://uacpgemini.onrender.com", protocols);
    }
    return new OriginalWebSocket(url, protocols);
  };
  window.WebSocket.prototype = OriginalWebSocket.prototype;
})();
