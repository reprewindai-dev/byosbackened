# =============================================================================
# Render Blueprint — BYOS AI Backend
# =============================================================================
# Deploy: push this repo to GitHub, then on Render: New + Blueprint, point
# at this repo. Render will provision Postgres + Redis + API + Worker.
#
# After first deploy, set the `sync: false` secrets manually in the Render
# dashboard (SECRET_KEY, OPENAI_API_KEY, STRIPE_SECRET_KEY, etc.).
# =============================================================================

databases:
  - name: byos-ai-db
    databaseName: byos_ai
    user: byos_user
    plan: standard          # 1 GB RAM, 256 MB storage burst, 100 connections
    postgresMajorVersion: "16"
    ipAllowList: []         # empty = only Render private network can connect

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: byos-ai-redis
    plan: starter           # bump to standard for >100MB cache
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []         # private-only

  # ── API web service ────────────────────────────────────────────────────────
  - type: web
    name: byos-ai-api
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.api
    dockerContext: .
    plan: standard          # 2 CPU / 2 GB — 4 gunicorn workers, ~2k RPS realistic
    region: oregon          # change if you have user concentration elsewhere
    healthCheckPath: /health
    autoDeploy: true
    numInstances: 1         # bump for HA / horizontal scale
    envVars:
      # ── Process tuning ────────────────────────────────────────────────────
      - key: WEB_CONCURRENCY
        value: "4"          # 2 CPU * 2 = 4 uvicorn workers
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json

      # ── App ───────────────────────────────────────────────────────────────
      - key: APP_NAME
        value: BYOS AI Backend
      - key: APP_VERSION
        value: 0.1.0
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1

      # ── Database (auto-injected from byos-ai-db) ──────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: byos-ai-db
          property: connectionString

      # ── Redis (auto-injected) ─────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          type: redis
          name: byos-ai-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: byos-ai-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: byos-ai-redis
          property: connectionString

      # ── Secrets — set in Render dashboard after first deploy ──────────────
      - key: SECRET_KEY
        generateValue: true       # Render generates 32-byte hex automatically
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"

      # ── CORS — UPDATE WITH YOUR REAL FRONTEND ORIGINS ─────────────────────
      - key: CORS_ORIGINS
        value: '["https://app.example.com"]'
      - key: CORS_ALLOW_CREDENTIALS
        value: "true"

      # ── Object storage (set in dashboard) ─────────────────────────────────
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: byos-ai
      - key: S3_REGION
        value: us-east-1
      - key: S3_USE_SSL
        value: "true"

      # ── AI providers (set in dashboard) ───────────────────────────────────
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_MODEL_CHAT
        value: mistralai/Mistral-7B-Instruct-v0.1
      - key: HUGGINGFACE_MODEL_EMBED
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: SERPAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_CHAT
        value: gpt-4o-mini
      - key: OPENAI_MODEL_WHISPER
        value: whisper-1
      - key: LOCAL_WHISPER_URL
        sync: false
      - key: LOCAL_LLM_URL
        sync: false

      # ── Stripe (set in dashboard) ─────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── Observability ─────────────────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false
      - key: METRICS_ENABLED
        value: "true"
      - key: PROMETHEUS_PORT
        value: "9090"

      # ── Cost kill-switch caps ─────────────────────────────────────────────
      - key: GLOBAL_DAILY_COST_CAP_USD
        value: "500"
      - key: WORKSPACE_DAILY_COST_CAP_USD
        value: "50"

  # ── Celery worker (background jobs) ────────────────────────────────────────
  - type: worker
    name: byos-ai-worker
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.worker
    dockerContext: .
    plan: starter           # bump if jobs queue up
    region: oregon
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: BYOS AI Backend Worker
      - key: APP_VERSION
        value: 0.1.0
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json

      - key: DATABASE_URL
        fromDatabase:
          name: byos-ai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: byos-ai-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: byos-ai-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: byos-ai-redis
          property: connectionString

      # Same secret keys as API service
      - key: SECRET_KEY
        fromService:
          type: web
          name: byos-ai-api
          envVarKey: SECRET_KEY
      - key: ENCRYPTION_KEY
        fromService:
          type: web
          name: byos-ai-api
          envVarKey: ENCRYPTION_KEY
      - key: ALGORITHM
        value: HS256

      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: byos-ai
      - key: S3_REGION
        value: us-east-1
      - key: S3_USE_SSL
        value: "true"

      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_MODEL_CHAT
        value: mistralai/Mistral-7B-Instruct-v0.1
      - key: HUGGINGFACE_MODEL_EMBED
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: SERPAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL_CHAT
        value: gpt-4o-mini
      - key: OPENAI_MODEL_WHISPER
        value: whisper-1
      - key: LOCAL_WHISPER_URL
        sync: false
      - key: LOCAL_LLM_URL
        sync: false

      - key: METRICS_ENABLED
        value: "true"
